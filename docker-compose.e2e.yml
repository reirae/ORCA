services:
  nginx:
    image: nginx:1.30.2-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.e2e.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    restart: "no"

  frontend:
    build:
      context: ./frontend
    restart: "no"

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  db:
    image: mysql:8.4.9
    env_file:
      - .env
    command: --innodb-buffer-pool-size=256M
    volumes:
      - mysql_e2e_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: "no"

volumes:
  mysql_e2e_data:
