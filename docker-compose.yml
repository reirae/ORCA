services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - frontend_build:/usr/share/nginx/html
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
    volumes:
      - frontend_build:/app/dist

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: mysql:8.4
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  frontend_build:
  mysql_data:
