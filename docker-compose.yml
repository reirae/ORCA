services:
  nginx:
    image: nginx:1.30.2-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G

  db:
    image: mysql:8.4.9
    env_file:
      - .env
    command: --innodb-buffer-pool-size=2G --innodb-log-buffer-size=64M
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
  loki:
    image: grafana/loki:3.7.2
    user: "10001:10001"
    volumes:
      - loki_data:/loki
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

  alloy:
    image: grafana/alloy:v1.17.0
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  mysql_data:
  loki_data: